name: MERN CI

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Root Packages
        run: npm install

      - name: Install Client
        run: |
          cd client
          npm install

      - name: Install Server
        run: |
          cd server
          npm install

      - name: Build React
        run: |
          cd client
          npm run build